<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="JIHI hand tools">
  <defs>
    <linearGradient id="bgV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e2f66"/>
      <stop offset="1" stop-color="#0f1836"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e4e9f0"/>
      <stop offset="1" stop-color="#9aa4b5"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5872a"/>
      <stop offset="1" stop-color="#d8641c"/>
    </linearGradient>
  </defs>

  <rect width="600" height="300" fill="url(#bgV)"/>

  <!-- faint gear motif -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="9">
    <circle cx="300" cy="150" r="95"/>
    <circle cx="300" cy="150" r="63"/>
  </g>
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="12">
    <line x1="300" y1="35" x2="300" y2="65"/>
    <line x1="300" y1="235" x2="300" y2="265"/>
    <line x1="170" y1="150" x2="200" y2="150"/>
    <line x1="400" y1="150" x2="430" y2="150"/>
  </g>
  <!-- orange accent corner -->
  <path d="M0 300 L0 248 L112 300 Z" fill="#e8641c" fill-opacity="0.9"/>

  <!-- Screwdriver -->
  <g transform="rotate(34 300 150)">
    <rect x="120" y="134" width="118" height="30" rx="15" fill="url(#handle)"/>
    <rect x="150" y="134" width="5" height="30" fill="#b95214" opacity="0.6"/>
    <rect x="168" y="134" width="5" height="30" fill="#b95214" opacity="0.6"/>
    <rect x="186" y="134" width="5" height="30" fill="#b95214" opacity="0.6"/>
    <rect x="238" y="138" width="15" height="22" rx="3" fill="#8b93a3"/>
    <rect x="253" y="144" width="150" height="10" rx="2" fill="url(#steel)"/>
    <polygon points="403,142 419,147 419,153 403,158" fill="#cdd3dd"/>
  </g>

  <!-- Wrench (open + box end) -->
  <g transform="rotate(-34 300 150)">
    <rect x="212" y="142" width="150" height="17" rx="8.5" fill="url(#steel)"/>
    <circle cx="212" cy="150" r="25" fill="url(#steel)"/>
    <circle cx="212" cy="150" r="12" fill="#16255a"/>
    <rect x="348" y="129" width="42" height="44" rx="8" fill="url(#steel)"/>
    <rect x="371" y="142" width="25" height="17" rx="3" fill="#16255a"/>
  </g>

  <!-- hex nut -->
  <g transform="translate(490 238)">
    <polygon points="-30,0 -15,-26 15,-26 30,0 15,26 -15,26" fill="#b9c1cd"/>
    <polygon points="-30,0 -15,-26 15,-26 30,0 15,26 -15,26" fill="none" stroke="#7e8798" stroke-width="2"/>
    <circle cx="0" cy="0" r="13" fill="#16255a"/>
  </g>
</svg>
